[mypy]
python_version = 3.11
warn_unused_configs = True
show_error_codes = True
pretty = True
mypy_path = asyncio-actors:fp-combinators:live-dispatch:persistent-collections:sealed-typing:taskgroup-collect:with-update
files = asyncio-actors/tests, fp-combinators/tests, live-dispatch/tests, persistent-collections/tests, sealed-typing/tests, taskgroup-collect/tests, with-update/tests, tests, benchmarks
check_untyped_defs = True
no_implicit_optional = True
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
disable_error_code = attr-defined,arg-type,assignment,call-arg,call-overload,func-returns-value,index,list-item,name-defined,no-any-return,operator,return-value,union-attr,unused-ignore,var-annotated

[mypy-pydantic.*]
ignore_missing_imports = True
