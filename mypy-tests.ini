[mypy]
python_version = 3.11
warn_unused_configs = True
show_error_codes = True
pretty = True
mypy_path = asyncio-actors:fp-combinators:live-dispatch:persistent-collections:sealed-typing:taskgroup-collect:with-update:hulista
files = asyncio-actors/tests, fp-combinators/tests, live-dispatch/tests, persistent-collections/tests, sealed-typing/tests, taskgroup-collect/tests, with-update/tests, hulista/tests, tests, benchmarks
check_untyped_defs = True
no_implicit_optional = True
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
# Tests legitimately access private attrs, use intentional type mismatches,
# and construct generics without annotations.  Only codes that produce real
# bugs are enabled; the rest are suppressed to avoid annotation noise.
# Run `mypy --config-file mypy-tests.ini` with codes removed one-at-a-time
# to check if any can be promoted.
disable_error_code = attr-defined,arg-type,assignment,call-arg,call-overload,func-returns-value,index,list-item,name-defined,operator,return-value,union-attr,unused-ignore,var-annotated

[mypy-pydantic.*]
ignore_missing_imports = True
