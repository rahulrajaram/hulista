name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14", "3.15"]
        include:
          - python-version: "3.14"
            allow-prereleases: true
          - python-version: "3.15"
            allow-prereleases: true

    name: Python ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases || false }}

      - name: Install test dependencies
        run: uv pip install --system pytest pytest-asyncio pytest-cov pytest-benchmark mypy build pydantic

      - name: Unit tests — persistent-collections
        run: cd persistent-collections && python -m pytest tests/ -v

      - name: Unit tests — sealed-typing
        run: cd sealed-typing && python -m pytest tests/ -v

      - name: Unit tests — fp-combinators
        run: cd fp-combinators && python -m pytest tests/ -v

      - name: Unit tests — live-dispatch
        run: cd live-dispatch && python -m pytest tests/ -v

      - name: Unit tests — with-update
        run: cd with-update && python -m pytest tests/ -v

      - name: Unit tests — asyncio-actors
        run: cd asyncio-actors && python -m pytest tests/ -v

      - name: Unit tests — taskgroup-collect
        run: cd taskgroup-collect && python -m pytest tests/ -v

      - name: Integration tests
        run: python -m pytest tests/test_integration.py -v

  coverage:
    runs-on: ubuntu-latest
    name: Coverage gates

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install repo tooling
        run: uv pip install --system pytest pytest-asyncio pytest-cov pytest-benchmark mypy build pydantic

      - name: Coverage
        run: make coverage

      - name: Upload coverage JSON
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: .benchmarks/coverage.json
          if-no-files-found: error

  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install repo tooling
        run: uv pip install --system pytest pytest-asyncio pytest-cov pytest-benchmark mypy build pydantic

      - name: Mypy
        run: make typecheck

  build:
    runs-on: ubuntu-latest
    name: Build packages

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: uv pip install --system build

      - name: Build all packages
        run: make build

  benchmark:
    runs-on: ubuntu-latest
    name: Benchmarks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: uv pip install --system pytest pytest-asyncio pytest-benchmark pydantic

      - name: Run benchmark suite
        run: make bench

      - name: Upload benchmark JSON
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-json
          path: .benchmarks/benchmark-results.json
          if-no-files-found: error

  sealed-typing-py310:
    runs-on: ubuntu-latest
    name: sealed-typing Python 3.10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: uv pip install --system pytest

      - name: Unit tests — sealed-typing
        run: cd sealed-typing && python -m pytest tests/ -v
