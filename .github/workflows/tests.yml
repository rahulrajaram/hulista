name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14", "3.15"]
        include:
          - python-version: "3.14"
            allow-prereleases: true
          - python-version: "3.15"
            allow-prereleases: true
            experimental: true

    name: Python ${{ matrix.python-version }}
    continue-on-error: ${{ matrix.experimental || false }}

    env:
      HULISTA_PYTHONPATH: "${{ github.workspace }}/asyncio-actors:${{ github.workspace }}/fp-combinators:${{ github.workspace }}/live-dispatch:${{ github.workspace }}/persistent-collections:${{ github.workspace }}/sealed-typing:${{ github.workspace }}/taskgroup-collect:${{ github.workspace }}/with-update:${{ github.workspace }}/hulista"

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases || false }}

      - name: Install test dependencies
        run: uv pip install --system pytest pytest-asyncio pytest-cov pytest-benchmark mypy build

      - name: Install pydantic (optional, unavailable on some pre-release Pythons)
        run: uv pip install --system pydantic || true

      - name: Unit tests — persistent-collections
        run: cd persistent-collections && python -m pytest tests/ -v

      - name: Unit tests — sealed-typing
        run: cd sealed-typing && python -m pytest tests/ -v

      - name: Unit tests — fp-combinators
        run: cd fp-combinators && python -m pytest tests/ -v

      - name: Unit tests — live-dispatch
        run: cd live-dispatch && PYTHONPATH="${HULISTA_PYTHONPATH}" python -m pytest tests/ -v

      - name: Unit tests — with-update
        run: cd with-update && PYTHONPATH="${HULISTA_PYTHONPATH}" python -m pytest tests/ -v

      - name: Unit tests — asyncio-actors
        run: cd asyncio-actors && PYTHONPATH="${HULISTA_PYTHONPATH}" python -m pytest tests/ -v

      - name: Unit tests — taskgroup-collect
        run: cd taskgroup-collect && python -m pytest tests/ -v

      - name: Unit tests — hulista
        run: cd hulista && PYTHONPATH="${HULISTA_PYTHONPATH}" python -m pytest tests/ -v

      - name: Integration tests
        run: PYTHONPATH="${HULISTA_PYTHONPATH}" python -m pytest tests/test_integration.py -v

  coverage:
    runs-on: ubuntu-latest
    name: Coverage gates

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install repo tooling
        run: uv pip install --system pytest pytest-asyncio pytest-cov pytest-benchmark mypy build pydantic

      - name: Coverage
        run: make coverage

      - name: Upload coverage JSON
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6.0.0
        with:
          name: coverage-json
          path: .benchmarks/coverage.json
          if-no-files-found: error

  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install repo tooling
        run: uv pip install --system pytest pytest-asyncio pytest-cov pytest-benchmark mypy build pydantic

      - name: Mypy
        run: make typecheck

  security:
    runs-on: ubuntu-latest
    name: Security audit

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install security tooling
        run: uv pip install --system bandit pip-audit

      - name: Run security checks
        run: make security

  deprecationcheck:
    runs-on: ubuntu-latest
    name: Deprecation check

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install repo tooling
        run: uv pip install --system pytest pytest-asyncio pytest-cov pytest-benchmark mypy build pydantic

      - name: Warnings as errors
        run: make deprecationcheck

  build:
    runs-on: ubuntu-latest
    name: Build packages

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: uv pip install --system build

      - name: Build all packages
        run: make build

  benchmark:
    runs-on: ubuntu-latest
    name: Benchmarks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: uv pip install --system pytest pytest-asyncio pytest-benchmark pydantic

      - name: Run benchmark suite
        run: make bench

      - name: Upload benchmark JSON
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6.0.0
        with:
          name: benchmark-json
          path: .benchmarks/benchmark-results.json
          if-no-files-found: error

  sealed-typing-py310:
    runs-on: ubuntu-latest
    name: sealed-typing Python 3.10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python 3.10
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: uv pip install --system pytest

      - name: Unit tests — sealed-typing
        run: cd sealed-typing && python -m pytest tests/ -v
