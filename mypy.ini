[mypy]
python_version = 3.11
warn_unused_configs = True
show_error_codes = True
pretty = True
mypy_path = asyncio-actors:fp-combinators:live-dispatch:persistent-collections:sealed-typing:taskgroup-collect:with-update
files = asyncio-actors/asyncio_actors, fp-combinators/fp_combinators, live-dispatch/live_dispatch, persistent-collections/persistent_collections, sealed-typing/sealed_typing, taskgroup-collect/taskgroup_collect, with-update/with_update, scripts
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True

[mypy-pydantic.*]
ignore_missing_imports = True
